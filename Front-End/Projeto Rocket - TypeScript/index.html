<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Controle de Missão Espacial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="painel">
  <h1>🚀 Mission Control Center</h1>

  <div class="secao">
    <h3>Configurar Foguete</h3>
    <input type="text" id="nomeFoguete" placeholder="Nome do Foguete">
    <input type="number" id="combustivel" placeholder="Combustível (L)">
    <button id="criarFoguete">Preparar Foguete</button>
  </div>

  <div class="secao">
    <h3>Configurar Satélite</h3>
    <input type="text" id="nomeSatelite" placeholder="Nome do Satélite">
    <input type="number" id="massa" placeholder="Massa (kg)">
    <button id="criarSatelite">Acoplar Satélite</button>
  </div>

  <button id="lancar" class="btn-lancar">IGNIÇÃO / LANÇAR</button>

  <h3>Status da Missão</h3>
  <pre id="output">Aguardando comandos...</pre>
</div>

<script src="dist/main.js"></script> </body>
</html>
